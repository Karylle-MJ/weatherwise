<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>">
    <title>{% block title %}WeatherWise{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --text-dark: #1a1a2e;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Split Screen Container - SAME BACKGROUND FOR BOTH */
        .split-container {
            display: flex;
            height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }
        
        /* Left Side - Branding */
        .brand-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }
        
        /* Right Side - Form */
        .form-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }
        
        /* Animated background shapes for both sides */
        .brand-side::before, .form-side::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }
        
        .form-side::before {
            animation-delay: -10s;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Floating weather icons */
        .floating-icon {
            position: absolute;
            font-size: 3rem;
            opacity: 0.15;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .brand-content {
            text-align: center;
            position: relative;
            z-index: 10;
        }
        
        .logo-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .logo-text {
            font-size: 3rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
            letter-spacing: -1px;
        }
        
        .logo-tagline {
            color: rgba(255,255,255,0.9);
            font-size: 1rem;
            margin-top: 10px;
        }
        
        .weather-features {
            margin-top: 40px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .feature {
            text-align: center;
            color: white;
        }
        
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .feature-text {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        
        /* Auth Card */
        .auth-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            z-index: 10;
        }
        
        .auth-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        
        .auth-subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        
        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }
        
        .form-control {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.5);
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        /* Error message */
        .error-message {
            background: rgba(254, 215, 215, 0.95);
            color: #742a2a;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #f56565;
            text-align: center;
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .split-container {
                flex-direction: column;
            }
            
            .brand-side {
                padding: 30px;
                min-height: 35vh;
            }
            
            .weather-features {
                display: none;
            }
            
            .logo-text {
                font-size: 2rem;
            }
            
            .logo-icon {
                font-size: 3rem;
            }
            
            .form-side {
                padding: 20px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="split-container">
        <!-- Left Side - Branding -->
        <div class="brand-side">
            <div class="floating-icon" style="top: 10%; left: 10%;">☀️</div>
            <div class="floating-icon" style="bottom: 15%; right: 10%;">🌧️</div>
            <div class="floating-icon" style="top: 30%; right: 20%;">⛅</div>
            
            <div class="brand-content">
                <div class="logo-icon">🌤️</div>
                <div class="logo-text">WeatherWise</div>
                <div class="logo-tagline">Smart Weather Forecasting</div>
                
                <div class="weather-features">
                    <div class="feature">
                        <div class="feature-icon">🌡️</div>
                        <div class="feature-text">Real-time Weather</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">📅</div>
                        <div class="feature-text">5-Day Forecast</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">⭐</div>
                        <div class="feature-text">Save Favorites</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Right Side - Form -->
        <div class="form-side">
            <div class="floating-icon" style="top: 20%; right: 15%;">🌤️</div>
            <div class="floating-icon" style="bottom: 25%; left: 10%;">⭐</div>
            
            <div class="auth-card">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
